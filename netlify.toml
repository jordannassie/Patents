[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[functions]]
  name = "hunter-process"
  schedule = "*/10 * * * *"

[[functions]]
  name = "hunter-daily"
  schedule = "0 7 * * *"

[[functions]]
  name = "hunter-weekly"
  schedule = "30 7 * * 1"

